apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-agent
  namespace: langgraph
spec:
  replicas: 3  # Увеличьте количество реплик
  selector:
    matchLabels:
      app: langgraph-agent
  template:
    metadata:
      labels:
        app: langgraph-agent
    spec:
      containers:
      - name: langgraph-agent
        image: langgraph-agent:latest
        imagePullPolicy: Always  # Для облака лучше Always
        ports:
        - containerPort: 8000
        env:
        - name: ES_HOST
          value: "elasticsearch"  # Для облака используйте внешний сервис
        - name: POSTGRES_HOST
          value: "postgres"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5